<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0a0a2e,#1a1a4e,#0d0d3b);min-height:100vh;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

.timer-bar{font-size:2em;font-weight:bold;color:#ffc107;text-align:center;margin:5px 0}
.timer-bar.danger{color:#ff4444;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.rosco-container{position:relative;width:min(90vw,400px);height:min(90vw,400px);margin:10px auto}
.letter-circle{position:absolute;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85em;cursor:pointer;transition:all .3s;border:2px solid #555}
.letter-circle.pending{background:#2a2a5e;border-color:#666}
.letter-circle.active{background:#ffc107;color:#000;border-color:#ff6b35;transform:scale(1.3);box-shadow:0 0 15px #ffc107}
.letter-circle.correct{background:#4caf50;border-color:#66bb6a}
.letter-circle.wrong{background:#f44336;border-color:#ef5350}
.letter-circle.passed{background:#ff9800;border-color:#ffb74d}
.question-area{text-align:center;padding:10px 20px;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:500px}
.question-text{font-size:1.1em;margin-bottom:12px;line-height:1.4}
.input-row{display:flex;gap:8px;width:100%;max-width:400px;justify-content:center}
.input-row input{flex:1;padding:14px;font-size:1.1em;border-radius:12px;border:2px solid #555;background:#1a1a4e;color:#fff;outline:none;min-height:48px}
.input-row input:focus{border-color:#ffc107}
.btn{padding:14px 20px;border:none;border-radius:12px;font-size:1em;font-weight:bold;cursor:pointer;min-height:48px;min-width:48px;transition:all .2s;touch-action:manipulation}
.btn-submit{background:linear-gradient(135deg,#4caf50,#66bb6a);color:#fff}
.btn-pass{background:linear-gradient(135deg,#ff9800,#ffb74d);color:#fff}
.btn-start{background:linear-gradient(135deg,#ffc107,#ff6b35);color:#000;font-size:1.2em;padding:16px 40px;margin:20px}
.btn:active{transform:scale(.95)}
.action-row{display:flex;gap:10px;margin-top:8px;justify-content:center}
.score-bar{display:flex;justify-content:center;gap:20px;padding:8px;font-size:.95em}
.score-bar span{padding:6px 14px;border-radius:20px}
.s-correct{background:#4caf5044;color:#4caf50}
.s-wrong{background:#f4433644;color:#f44336}
.s-passed{background:#ff980044;color:#ff9800}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;overflow-y:auto}
.overlay-box{background:linear-gradient(135deg,#1a1a4e,#2a2a6e);border-radius:20px;padding:30px;text-align:center;max-width:500px;width:100%;border:2px solid #ffc107;margin:auto}
.overlay-box h2{font-size:1.8em;margin-bottom:15px;color:#ffc107}
.overlay-box p{font-size:1.1em;margin:8px 0;line-height:1.5}
.hidden{display:none}
.btn-mic{background:linear-gradient(135deg,#2196f3,#42a5f5);color:#fff;font-size:1.3em;width:52px;display:flex;align-items:center;justify-content:center}
.btn-mic.listening{background:linear-gradient(135deg,#f44336,#ef5350);animation:pulse-mic 1s infinite}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,.5)}50%{box-shadow:0 0 0 12px rgba(244,67,54,0)}}
.mic-status{font-size:.75em;color:#42a5f5;margin-top:4px;min-height:18px;text-align:center}
.mic-status.error{color:#f44336}
.answers-section{margin-top:20px;text-align:left;width:100%}
.answers-section h3{color:#ffc107;font-size:1.2em;margin-bottom:12px;text-align:center;border-bottom:1px solid #ffc10744;padding-bottom:8px}
.answer-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;padding:8px 10px;border-radius:10px;font-size:.9em;line-height:1.4}
.answer-item.wrong-answer{background:rgba(244,67,54,0.15);border-left:3px solid #f44336}
.answer-item.passed-answer{background:rgba(255,152,0,0.15);border-left:3px solid #ff9800}
.answer-letter{font-weight:bold;font-size:1.1em;min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wrong-answer .answer-letter{background:#f44336;color:#fff}
.passed-answer .answer-letter{background:#ff9800;color:#fff}
.answer-detail{flex:1}
.answer-detail .a-question{color:#ccc;font-size:.85em;margin-bottom:3px}
.answer-detail .a-correct{color:#4caf50;font-weight:bold}
</style>
</head>

    {letter:'T',q:'Empieza por T: Temperatura corporal normal en la axila, que oscila entre 36 y 37 grados centigrados',answers:['temperatura','temperatura axilar','36','36.5']},

    {letter:'W',q:'Contiene la W: Norma de prevencion de riesgos laborales, ley 31 del ano 1995',answers:['ley 31/1995','ley 31 1995','ley de prevencion','ley de prevencion de riesgos laborales']},
    {letter:'X',q:'Contiene la X: Tipo de asfixia por obstruccion de las vias aereas por un cuerpo extrano, conocida como atragantamiento',answers:['asfixia','obstruccion','atragantamiento','ovace']},
    {letter:'Y',q:'Contiene la Y: Via de administracion de medicamentos mediante inyeccion directa en el torrente sanguineo venoso',answers:['intravenosa','inyeccion intravenosa','endovenosa','iv']},
    {letter:'Z',q:'Contiene la Z: Organo glandular situado detras del estomago que produce insulina y glucagon',answers:['pancreas']}
  ],
  // ===== ROSCO 5 =====
  [
    {letter:'A',q:'Empieza por A: Baston con cuatro puntos de apoyo que ofrece mayor estabilidad en la deambulacion',answers:['andador','baston cuadripode','andador con ruedas']},
    {letter:'B',q:'Empieza por B: Principio bioetico que obliga a hacer el bien al paciente y actuar en su beneficio',answers:['beneficencia','principio de beneficencia']},
    {letter:'C',q:'Empieza por C: Cinco fases del duelo segun Kubler-Ross: negacion, ira, negociacion, depresion y...',answers:['aceptacion']},
    {letter:'D',q:'Empieza por D: Dieta terapeutica que restringe la ingesta de sodio, indicada en hipertension y edemas',answers:['dieta hiposodica','dieta sin sal','dieta baja en sodio']},
    {letter:'E',q:'Empieza por E: Clasificacion de las faltas disciplinarias en el convenio del SEPAD: leves, graves y muy...',answers:['graves','especialmente graves','muy graves']},
    {letter:'F',q:'Empieza por F: Factor de riesgo de caidas en ancianos relacionado con la toma de mas de 4 medicamentos',answers:['farmacologico','polifarmacia','polimedicacion']},
    {letter:'G',q:'Empieza por G: Tipo de lavado que se realiza en pacientes encamados desde la zona genital, de delante hacia atras',answers:['genital','lavado genital','higiene genital']},
    {letter:'H',q:'Empieza por H: Tipo de hemorragia en la que la sangre sale a borbotones, de color rojo brillante, procedente de una arteria',answers:['hemorragia arterial','arterial']},
    {letter:'I',q:'Empieza por I: Via de administracion de medicamentos con aguja en angulo de 15 grados, entre la epidermis y la dermis',answers:['intradermica','via intradermica','id']},
    {letter:'J',q:'Contiene la J: Principio bioetico que establece la distribucion equitativa de los recursos sanitarios',answers:['justicia','principio de justicia']},
    {letter:'K',q:'Contiene la K: Sindrome de desgaste profesional caracterizado por agotamiento, despersonalizacion y baja realizacion personal',answers:['burnout','sindrome de burnout']},
    {letter:'L',q:'Empieza por L: Ropa de cama que se coloca sobre el colchon y se fija por debajo del mismo, en contacto directo con el paciente',answers:['sabana bajera','bajera','lenzuelo']},
    {letter:'M',q:'Empieza por M: Piramide que jerarquiza las necesidades humanas en cinco niveles: fisiologicas, seguridad, sociales, estima y autorrealizacion',answers:['maslow','piramide de maslow','abraham maslow']},
    {letter:'N',q:'Empieza por N: Tipo de dieta absoluta en la que el paciente no puede ingerir ningun alimento ni liquido por via oral',answers:['nada por boca','npo','dieta absoluta','nada']},
    {letter:'O',q:'Empieza por O: Terapia de administracion de oxigeno a pacientes con insuficiencia respiratoria',answers:['oxigenoterapia','oxigeno']},
    {letter:'P',q:'Empieza por P: Posicion del paciente tumbado de lado, usada para la administracion de enemas, tambien llamada posicion de Sims',answers:['posicion de sims','sims','posicion lateral de seguridad']},
    {letter:'Q',q:'Contiene la Q: Tipo de cama hospitalaria que se presenta con la ropa recogida en forma de abanico para recibir al paciente del quirofano',answers:['quirofano','cama quirurgica','cama de anestesia','cama de quirofano']},
    {letter:'R',q:'Empieza por R: Pendiente maxima permitida para rampas de acceso de sillas de ruedas, que es del 8 al 10 por ciento',answers:['rampa','rampas','rampa accesible']},
    {letter:'S',q:'Empieza por S: Posicion lateral izquierda con pierna superior flexionada usada para enemas y examen rectal',answers:['sims','posicion de sims']},
    {letter:'T',q:'Empieza por T: Amortajamiento o preparacion del cadaver que incluye lavado, identificacion, vendaje y colocacion del sudario',answers:['tanatopractico','tanatopaxia','cuidados postmortem','amortajamiento']},
    {letter:'U',q:'Empieza por U: Tipo de sonda urinaria de un solo uso para vaciado puntual de la vejiga, sin balon de fijacion',answers:['uretral','sonda uretral','sondaje intermitente','nelaton','sonda nelaton']},
    {letter:'V',q:'Empieza por V: Tipo de discriminacion laboral en la que la mujer no puede ascender a puestos directivos, llamada techo de cristal',answers:['vertical','techo de cristal','discriminacion vertical']},
    {letter:'W',q:'Contiene la W: Organizacion mundial de la salud que definio la escalera analgesica de tres escalones',answers:['oms','organizacion mundial de la salud','who']},
    {letter:'X',q:'Contiene la X: Tipo de riesgo laboral por contacto con agentes biologicos como sangre y fluidos corporales',answers:['exposicion','riesgo biologico','biologico']},
    {letter:'Y',q:'Contiene la Y: Tipo de ayuda para la deambulacion formada por dos barras metalicas con empunadura que se apoyan en las axilas',answers:['muletas axilares','muletas','muleta']},
    {letter:'Z',q:'Contiene la Z: Organo del cuerpo humano situado en la pelvis que almacena la orina producida por los rinones',answers:['vejiga','vejiga urinaria']}
  ]
];

// Select a random rosco
const questions = allRoscos[Math.floor(Math.random() * allRoscos.length)];

let state=[], current=0, timer=200, interval=null, correct=0, wrong=0, passed=0, playing=false;

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}

function initRosco(){
  const container=document.getElementById('rosco');
  const cx=container.offsetWidth/2, cy=container.offsetHeight/2;
  const r=Math.min(cx,cy)-22;
  questions.forEach((q,i)=>{
    const angle=(i/26)*2*Math.PI - Math.PI/2;
    const x=cx+r*Math.cos(angle)-18;
    const y=cy+r*Math.sin(angle)-18;
    const el=document.createElement('div');
    el.className='letter-circle pending';
    el.id='lc'+i;
    el.textContent=q.letter;
    el.style.left=x+'px';
    el.style.top=y+'px';
    container.appendChild(el);
    state.push('pending');
  });
}

function updateScores(){
  document.getElementById('sc').textContent='Aciertos: '+correct;
  document.getElementById('sw').textContent='Fallos: '+wrong;
  document.getElementById('sp').textContent='Pasadas: '+passed;
}

function findNext(){
  let count=0;
  while(count<26){
    current=(current+1)%26;
    if(state[current]==='pending'||state[current]==='passed') return true;
    count++;
  }
  return false;
}

// --- Voice Recognition ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
}

function toggleMic() {
  if (!recognition) {
    const st = document.getElementById('micStatus');
    if (st) { st.textContent = 'Tu navegador no soporta voz'; st.className = 'mic-status error'; }
    return;
  }
  if (isListening) {
    recognition.stop();
    return;
  }
  const inp = document.getElementById('ansInput');
  const micBtn = document.getElementById('micBtn');
  const st = document.getElementById('micStatus');
  if (!inp || !micBtn) return;

  isListening = true;
  micBtn.classList.add('listening');
  micBtn.textContent = '\u23F9\uFE0F';
  if (st) { st.textContent = 'Escuchando...'; st.className = 'mic-status'; }

  recognition.onresult = function(e) {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript = e.results[i][0].transcript;
    }
    inp.value = transcript.trim();
    if (st) st.textContent = '\uD83C\uDFA4 "' + transcript.trim() + '"';
    // Auto-submit on final result
    if (e.results[e.results.length - 1].isFinal) {
      setTimeout(() => submitAnswer(), 300);
    }
  };

  recognition.onerror = function(e) {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '\uD83C\uDFA4';
    if (st) {
      if (e.error === 'not-allowed') {
        st.textContent = 'Permite el micr\u00F3fono en ajustes';
      } else {
        st.textContent = 'No te he o\u00EDdo, int\u00E9ntalo de nuevo';
      }
      st.className = 'mic-status error';
    }
  };

  recognition.onend = function() {
    isListening = false;
    if (micBtn) { micBtn.classList.remove('listening'); micBtn.textContent = '\uD83C\uDFA4'; }
  };

  recognition.start();
}

function showQuestion(){
  document.querySelectorAll('.letter-circle').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('lc'+current);
  el.classList.add('active');
  const qa=document.getElementById('qArea');
  const micSupported = !!recognition;
  qa.innerHTML=`
    <div class="question-text">${questions[current].q}</div>
    <div class="input-row">
      <input type="text" id="ansInput" placeholder="Escribe o usa el micro..." autocomplete="off" autocapitalize="none" autofocus>
      ${micSupported ? '<button class="btn btn-mic" id="micBtn" onclick="toggleMic()">\uD83C\uDFA4</button>' : ''}
      <button class="btn btn-submit" onclick="submitAnswer()">OK</button>
    </div>
    <div class="action-row">
      <button class="btn btn-pass" onclick="passQuestion()">PASAPALABRA</button>
    </div>
    ${micSupported ? '<div class="mic-status" id="micStatus"></div>' : ''}`;
  document.getElementById('ansInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer()});
  setTimeout(()=>{const inp=document.getElementById('ansInput');if(inp)inp.focus()},100);
}

function stopMic(){
  if(recognition && isListening){try{recognition.stop()}catch(e){} isListening=false;}
}

function submitAnswer(){
  stopMic();
  const inp=document.getElementById('ansInput');
  if(!inp)return;
  const val=normalize(inp.value);
  if(!val)return;
  const q=questions[current];
  const isCorrect=q.answers.some(a=>normalize(a)===val);
  const el=document.getElementById('lc'+current);
  if(isCorrect){
    state[current]='correct';el.className='letter-circle correct';correct++;
  } else {
    state[current]='wrong';el.className='letter-circle wrong';wrong++;
  }
  el.classList.remove('active');
  updateScores();
  if(correct+wrong+countPending()===26-countPending()&&!state.includes('pending')&&!state.includes('passed')){endGame();return}
  if(!findNext()){endGame();return}
  showQuestion();
}

function countPending(){return state.filter(s=>s==='pending'||s==='passed').length}

function passQuestion(){
  stopMic();
  if(state[current]==='pending'){passed++;state[current]='passed';
    const el=document.getElementById('lc'+current);el.className='letter-circle passed';el.classList.remove('active');
  }
  updateScores();
  if(!findNext()){endGame();return}
  showQuestion();
}

function startGame(){
  playing=true;current=-1;
  findNext();
  showQuestion();
  interval=setInterval(()=>{
    timer--;
    const tb=document.getElementById('timer');
    tb.textContent=timer;
    if(timer<=30)tb.classList.add('danger');
    if(timer<=0){clearInterval(interval);endGame()}
  },1000);
}

function endGame(){
  playing=false;
  if(interval)clearInterval(interval);
  const ov=document.getElementById('endOverlay');
  ov.classList.remove('hidden');
  const total=26;
  let title=correct===total?'ROSCO COMPLETADO':'FIN DEL JUEGO';
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endMsg').innerHTML=
    `<span style="color:#4caf50">Aciertos: ${correct}</span><br>
     <span style="color:#f44336">Fallos: ${wrong}</span><br>
     <span style="color:#ff9800">Sin responder: ${26-correct-wrong}</span><br><br>
     Puntuaci\u00F3n: ${correct} / 26`;

  // Build answers review section
  let reviewHTML = '';
  let hasReview = false;
  questions.forEach((q, i) => {
    if (state[i] === 'wrong' || state[i] === 'passed' || state[i] === 'pending') {
      hasReview = true;
      const cls = state[i] === 'wrong' ? 'wrong-answer' : 'passed-answer';
      const label = state[i] === 'wrong' ? 'Fallada' : 'Sin responder';
      reviewHTML += `
        <div class="answer-item ${cls}">
          <div class="answer-letter">${q.letter}</div>
          <div class="answer-detail">
            <div class="a-question">${q.q}</div>
            <div class="a-correct">Respuesta: ${q.answers[0]}</div>
          </div>
        </div>`;
    }
  });

  if (hasReview) {
    document.getElementById('answersReview').innerHTML = `
      <div class="answers-section">
        <h3>Respuestas correctas</h3>
        ${reviewHTML}
      </div>`;
  } else {
    document.getElementById('answersReview').innerHTML = '';
  }
}

initRosco();
</script>
