<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pasapalabra TCAE SEPAD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0a0a2e,#1a1a4e,#0d0d3b);min-height:100vh;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}
h1{text-align:center;padding:15px;font-size:1.6em;background:linear-gradient(90deg,#ff6b35,#ffc107);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
.timer-bar{font-size:2em;font-weight:bold;color:#ffc107;text-align:center;margin:5px 0}
.timer-bar.danger{color:#ff4444;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.rosco-container{position:relative;width:min(90vw,400px);height:min(90vw,400px);margin:10px auto}
.letter-circle{position:absolute;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85em;cursor:pointer;transition:all .3s;border:2px solid #555}
.letter-circle.pending{background:#2a2a5e;border-color:#666}
.letter-circle.active{background:#ffc107;color:#000;border-color:#ff6b35;transform:scale(1.3);box-shadow:0 0 15px #ffc107}
.letter-circle.correct{background:#4caf50;border-color:#66bb6a}
.letter-circle.wrong{background:#f44336;border-color:#ef5350}
.letter-circle.passed{background:#ff9800;border-color:#ffb74d}
.question-area{text-align:center;padding:10px 20px;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:500px}
.question-text{font-size:1.1em;margin-bottom:12px;line-height:1.4}
.input-row{display:flex;gap:8px;width:100%;max-width:400px;justify-content:center}
.input-row input{flex:1;padding:14px;font-size:1.1em;border-radius:12px;border:2px solid #555;background:#1a1a4e;color:#fff;outline:none;min-height:48px}
.input-row input:focus{border-color:#ffc107}
.btn{padding:14px 20px;border:none;border-radius:12px;font-size:1em;font-weight:bold;cursor:pointer;min-height:48px;min-width:48px;transition:all .2s;touch-action:manipulation}
.btn-submit{background:linear-gradient(135deg,#4caf50,#66bb6a);color:#fff}
.btn-pass{background:linear-gradient(135deg,#ff9800,#ffb74d);color:#fff}
.btn-start{background:linear-gradient(135deg,#ffc107,#ff6b35);color:#000;font-size:1.2em;padding:16px 40px;margin:20px}
.btn:active{transform:scale(.95)}
.action-row{display:flex;gap:10px;margin-top:8px;justify-content:center}
.score-bar{display:flex;justify-content:center;gap:20px;padding:8px;font-size:.95em}
.score-bar span{padding:6px 14px;border-radius:20px}
.s-correct{background:#4caf5044;color:#4caf50}
.s-wrong{background:#f4433644;color:#f44336}
.s-passed{background:#ff980044;color:#ff9800}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay-box{background:linear-gradient(135deg,#1a1a4e,#2a2a6e);border-radius:20px;padding:30px;text-align:center;max-width:400px;width:100%;border:2px solid #ffc107}
.overlay-box h2{font-size:1.8em;margin-bottom:15px;color:#ffc107}
.overlay-box p{font-size:1.1em;margin:8px 0;line-height:1.5}
.hidden{display:none}
</style>
</head>
<body>

<h1>PASAPALABRA TCAE</h1>
<div class="timer-bar" id="timer">200</div>
<div class="score-bar">
  <span class="s-correct" id="sc">Aciertos: 0</span>
  <span class="s-wrong" id="sw">Fallos: 0</span>
  <span class="s-passed" id="sp">Pasadas: 0</span>
</div>
<div class="rosco-container" id="rosco"></div>
<div class="question-area" id="qArea">
  <button class="btn btn-start" id="startBtn" onclick="startGame()">COMENZAR</button>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="overlay-box">
    <h2 id="endTitle">FIN DEL JUEGO</h2>
    <p id="endMsg"></p>
    <button class="btn btn-start" onclick="location.reload()" style="margin-top:15px">JUGAR DE NUEVO</button>
  </div>
</div>

<script>
const questions = [
  {letter:'A',q:'Empieza por A: Ausencia total de microorganismos',answers:['asepsia']},
  {letter:'B',q:'Empieza por B: Escala que mide las actividades basicas de la vida diaria (ABVD)',answers:['barthel','escala de barthel','indice de barthel']},
  {letter:'C',q:'Empieza por C: Tipo de aislamiento para pacientes con tuberculosis pulmonar',answers:['contacto','aereo','respiratorio']},
  {letter:'D',q:'Empieza por D: Posicion en la que el paciente se coloca boca abajo',answers:['decubito prono','decubito ventral']},
  {letter:'E',q:'Empieza por E: Eliminacion de germenes patogenos excepto esporas',answers:['esterilizacion','esterilizaciOn']},
  {letter:'F',q:'Empieza por F: Posicion semisentada con cabecero elevado a 45 grados',answers:['fowler']},
  {letter:'G',q:'Empieza por G: Escala que valora el nivel de consciencia (ocular, verbal, motora)',answers:['glasgow','escala de glasgow']},
  {letter:'H',q:'Empieza por H: Tension arterial elevada por encima de 140/90 mmHg',answers:['hipertension','hipertension arterial','hta']},
  {letter:'I',q:'Empieza por I: Infeccion adquirida durante la estancia hospitalaria',answers:['infeccion nosocomial','infeccion hospitalaria','iras']},
  {letter:'J',q:'Empieza por J: Liquido sinovial presente en las articulaciones',answers:['jugo sinovial','junta articular']},
  {letter:'K',q:'Contiene la K: Enfermedad pulmonar cronica tambien llamada EPOC que incluye bronquitis y enfisema',answers:['epoc']},
  {letter:'L',q:'Empieza por L: Ley General de Sanidad de 1986',answers:['ley 14/1986','ley general de sanidad','ley 14 1986']},
  {letter:'M',q:'Empieza por M: Tecnica de lavado de manos usado en quirofano',answers:['manos quirurgico','lavado quirurgico']},
  {letter:'N',q:'Empieza por N: Escala que mide el riesgo de ulceras por presion',answers:['norton','escala de norton']},
  {letter:'O',q:'Empieza por O: Aparato que mide la saturacion de oxigeno en sangre',answers:['oximetro','pulsioximetro','oximetro de pulso']},
  {letter:'P',q:'Empieza por P: Material utilizado para inmovilizar fracturas oseas',answers:['proteccion','ferula','escayola']},
  {letter:'Q',q:'Contiene la Q: Aparato que se usa para aplicar calor seco localizado',answers:['moquero','bolsa']},
  {letter:'R',q:'Empieza por R: Maniobra de reanimacion cardiopulmonar basica',answers:['rcp','reanimacion cardiopulmonar','reanimacion']},
  {letter:'S',q:'Empieza por S: Posicion del paciente tumbado boca arriba',answers:['supino','decubito supino','supina']},
  {letter:'T',q:'Empieza por T: Posicion con la cabeza mas baja que los pies',answers:['trendelenburg','posicion de trendelenburg']},
  {letter:'U',q:'Empieza por U: Lesion en la piel causada por presion prolongada (siglas UPP)',answers:['upp','ulcera por presion','ulceras por presion']},
  {letter:'V',q:'Empieza por V: Constante vital que mide las pulsaciones del corazon',answers:['velocidad','frecuencia']},
  {letter:'W',q:'Contiene la W: Unidad de medida de potencia utilizada en electromedicina',answers:['watt','vatio','w']},
  {letter:'X',q:'Contiene la X: Tecnica diagnostica por imagen que utiliza radiacion ionizante',answers:['rayos x','radiografia','rx']},
  {letter:'Y',q:'Contiene la Y: Mineral esencial para la funcion tiroidea que se encuentra en la sal',answers:['yodo','iodo']},
  {letter:'Z',q:'Empieza por Z: Tipo de vendaje en espiral que forma ochos',answers:['zigzag','espiga','espiral']},
];

let state=[], current=0, timer=200, interval=null, correct=0, wrong=0, passed=0, playing=false;

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}

function initRosco(){
  const container=document.getElementById('rosco');
  const cx=container.offsetWidth/2, cy=container.offsetHeight/2;
  const r=Math.min(cx,cy)-22;
  questions.forEach((q,i)=>{
    const angle=(i/26)*2*Math.PI - Math.PI/2;
    const x=cx+r*Math.cos(angle)-18;
    const y=cy+r*Math.sin(angle)-18;
    const el=document.createElement('div');
    el.className='letter-circle pending';
    el.id='lc'+i;
    el.textContent=q.letter;
    el.style.left=x+'px';
    el.style.top=y+'px';
    container.appendChild(el);
    state.push('pending');
  });
}

function updateScores(){
  document.getElementById('sc').textContent='Aciertos: '+correct;
  document.getElementById('sw').textContent='Fallos: '+wrong;
  document.getElementById('sp').textContent='Pasadas: '+passed;
}

function findNext(){
  let count=0;
  while(count<26){
    current=(current+1)%26;
    if(state[current]==='pending'||state[current]==='passed') return true;
    count++;
  }
  return false;
}

function showQuestion(){
  document.querySelectorAll('.letter-circle').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('lc'+current);
  el.classList.add('active');
  const qa=document.getElementById('qArea');
  qa.innerHTML=`
    <div class="question-text">${questions[current].q}</div>
    <div class="input-row">
      <input type="text" id="ansInput" placeholder="Tu respuesta..." autocomplete="off" autocapitalize="none" autofocus>
      <button class="btn btn-submit" onclick="submitAnswer()">OK</button>
    </div>
    <div class="action-row">
      <button class="btn btn-pass" onclick="passQuestion()">PASAPALABRA</button>
    </div>`;
  document.getElementById('ansInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer()});
  setTimeout(()=>{const inp=document.getElementById('ansInput');if(inp)inp.focus()},100);
}

function submitAnswer(){
  const inp=document.getElementById('ansInput');
  if(!inp)return;
  const val=normalize(inp.value);
  if(!val)return;
  const q=questions[current];
  const isCorrect=q.answers.some(a=>normalize(a)===val);
  const el=document.getElementById('lc'+current);
  if(isCorrect){
    state[current]='correct';el.className='letter-circle correct';correct++;
  } else {
    state[current]='wrong';el.className='letter-circle wrong';wrong++;
  }
  el.classList.remove('active');
  updateScores();
  if(correct+wrong+countPending()===26-countPending()&&!state.includes('pending')&&!state.includes('passed')){endGame();return}
  if(!findNext()){endGame();return}
  showQuestion();
}

function countPending(){return state.filter(s=>s==='pending'||s==='passed').length}

function passQuestion(){
  if(state[current]==='pending'){passed++;state[current]='passed';
    const el=document.getElementById('lc'+current);el.className='letter-circle passed';el.classList.remove('active');
  }
  updateScores();
  if(!findNext()){endGame();return}
  showQuestion();
}

function startGame(){
  playing=true;current=-1;
  findNext();
  showQuestion();
  interval=setInterval(()=>{
    timer--;
    const tb=document.getElementById('timer');
    tb.textContent=timer;
    if(timer<=30)tb.classList.add('danger');
    if(timer<=0){clearInterval(interval);endGame()}
  },1000);
}

function endGame(){
  playing=false;
  if(interval)clearInterval(interval);
  const ov=document.getElementById('endOverlay');
  ov.classList.remove('hidden');
  const total=26;
  let title=correct===total?'ROSCO COMPLETADO':'FIN DEL JUEGO';
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endMsg').innerHTML=
    `<span style="color:#4caf50">Aciertos: ${correct}</span><br>
     <span style="color:#f44336">Fallos: ${wrong}</span><br>
     <span style="color:#ff9800">Sin responder: ${26-correct-wrong}</span><br><br>
     Puntuacion: ${correct} / 26`;
}

initRosco();
</script>
</body>
</html>
