<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Test por Temas - OpoJuegos TCAE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}
.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  margin-bottom: 16px;
}
.btn-home {
  background: rgba(155,89,182,0.25);
  border: 1px solid rgba(155,89,182,0.5);
  color: #fff;
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  text-decoration: none;
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s;
}
.btn-home:hover, .btn-home:active { background: rgba(155,89,182,0.45); }
h1 {
  font-size: 22px;
  text-align: center;
  flex: 1;
}
h1 span { color: #9b59b6; }

/* Theme Selection */
#screen-temas { display: block; }
#screen-quiz, #screen-results { display: none; }
.subtitle {
  text-align: center;
  color: rgba(255,255,255,0.7);
  margin-bottom: 20px;
  font-size: 15px;
}
.temas-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.tema-btn {
  background: rgba(155,89,182,0.15);
  border: 1px solid rgba(155,89,182,0.35);
  color: #fff;
  padding: 14px 16px;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  text-align: left;
  min-height: 50px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tema-btn:hover, .tema-btn:active {
  background: rgba(155,89,182,0.35);
  border-color: #9b59b6;
  transform: scale(1.01);
}
.tema-num {
  background: #9b59b6;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.tema-name { flex: 1; line-height: 1.3; }

/* Quiz Screen */
.quiz-header {
  margin-bottom: 20px;
}
.quiz-tema-title {
  font-size: 16px;
  color: #9b59b6;
  margin-bottom: 10px;
  text-align: center;
}
.progress-bar-container {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  height: 10px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-bar-fill {
  background: linear-gradient(90deg, #9b59b6, #c39bd3);
  height: 100%;
  border-radius: 10px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  text-align: center;
}
.question-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  margin-top: 16px;
}
.question-number {
  color: #9b59b6;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
}
.question-text {
  font-size: 17px;
  line-height: 1.5;
  margin-bottom: 20px;
}
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option-btn {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  color: #fff;
  padding: 14px 16px;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  text-align: left;
  min-height: 48px;
  line-height: 1.4;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.option-btn:hover:not(.disabled) {
  background: rgba(155,89,182,0.2);
  border-color: rgba(155,89,182,0.5);
}
.option-btn.selected {
  background: rgba(155,89,182,0.3);
  border-color: #9b59b6;
}
.option-btn.correct {
  background: rgba(46,204,113,0.25);
  border-color: #2ecc71;
  color: #2ecc71;
}
.option-btn.incorrect {
  background: rgba(231,76,60,0.25);
  border-color: #e74c3c;
  color: #e74c3c;
}
.option-btn.disabled { pointer-events: none; }
.explanation-box {
  margin-top: 16px;
  padding: 14px;
  background: rgba(155,89,182,0.15);
  border-left: 4px solid #9b59b6;
  border-radius: 0 10px 10px 0;
  font-size: 14px;
  line-height: 1.5;
  color: rgba(255,255,255,0.9);
  display: none;
}
.btn-next {
  display: none;
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: #9b59b6;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-height: 50px;
  transition: background 0.2s;
}
.btn-next:hover, .btn-next:active { background: #8e44ad; }

/* Results Screen */
.results-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
}
.score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 6px solid #9b59b6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
}
.score-number {
  font-size: 42px;
  font-weight: 700;
  color: #9b59b6;
}
.score-total {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
}
.score-percent {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
}
.score-message {
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  margin-bottom: 16px;
}
.results-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.results-buttons button {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  min-height: 50px;
  transition: background 0.2s;
}
.btn-retry {
  background: #9b59b6;
  color: #fff;
}
.btn-retry:hover { background: #8e44ad; }
.btn-back-temas {
  background: rgba(155,89,182,0.2);
  border: 1px solid rgba(155,89,182,0.5) !important;
  color: #fff;
}
.btn-back-temas:hover { background: rgba(155,89,182,0.35); }

.review-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  text-align: left;
  color: #9b59b6;
}
.review-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  text-align: left;
}
.review-item.review-correct { border-left: 4px solid #2ecc71; }
.review-item.review-wrong { border-left: 4px solid #e74c3c; }
.review-q {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.4;
}
.review-answer {
  font-size: 14px;
  margin-bottom: 4px;
  line-height: 1.4;
}
.review-answer.user-wrong { color: #e74c3c; }
.review-answer.correct-ans { color: #2ecc71; }
.review-explanation {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-top: 6px;
  line-height: 1.4;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <a href="index.html" class="btn-home">&#127968; Menu</a>
    <h1>Test por <span>Temas</span></h1>
    <div style="width:90px"></div>
  </header>

  <!-- SCREEN 1: Theme Selection -->
  <div id="screen-temas">
    <p class="subtitle">Elige un tema para practicar 20 preguntas tipo test</p>
    <div class="temas-grid" id="temas-grid"></div>
  </div>

  <!-- SCREEN 2: Quiz -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <div class="quiz-tema-title" id="quiz-tema-title"></div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">Pregunta 1 de 20</div>
    </div>
    <div class="question-card">
      <div class="question-number" id="question-number"></div>
      <div class="question-text" id="question-text"></div>
      <div class="options-list" id="options-list"></div>
      <div class="explanation-box" id="explanation-box"></div>
      <button class="btn-next" id="btn-next">Siguiente pregunta</button>
    </div>
  </div>

  <!-- SCREEN 3: Results -->
  <div id="screen-results">
    <div class="results-card">
      <div class="score-circle">
        <div class="score-number" id="score-number">0</div>
        <div class="score-total">/ 20</div>
      </div>
      <div class="score-percent" id="score-percent">0%</div>
      <div class="score-message" id="score-message"></div>
    </div>
    <div class="results-buttons">
      <button class="btn-retry" id="btn-retry">Repetir tema</button>
      <button class="btn-back-temas" id="btn-back-temas">Elegir otro tema</button>
    </div>
    <div class="review-title">Repaso de respuestas</div>
    <div id="review-list"></div>
  </div>
</div>

<script>
const temas = [
  {
    id: 1,
    nombre: "Sistema Nacional de Salud y SES",
    preguntas: [
      { q: "La atención hospitalaria se ve caracterizada por:", a: ["Una amplia gama de pacientes","Una edad media de sus usuarios cada vez mayor","Un amplio equipo de especialistas","Una amplia gama de recursos"], c: 1, e: "Geriatrización de la medicina = edad media cada vez mayor." },
      { q: "En la actualidad, se tiende a mantener a los ancianos:", a: ["En su entorno habitual","En residencias especializadas","En unidades aisladas","En trabajos mantenidos"], c: 0, e: "Principio clave: mantener al anciano en su entorno." },
      { q: "Entre los objetivos de la Ayuda a Domicilio NO se encuentra:", a: ["Mejorar la calidad de vida","Prevenir deterioro personal y social","Potenciar el INGRESO en centros residenciales","Apoyar a grupos familiares"], c: 2, e: "Es POTENCIAR ALTERNATIVAS al ingreso, no potenciar el ingreso." },
      { q: "¿Cuál es una obligación (no derecho) del usuario de Ayuda a Domicilio?", a: ["Recibir la prestación adecuadamente","Corresponsabilizarse en el coste","Exigir más horas de servicio","Elegir al profesional"], c: 1, e: "Contribuir al coste es obligación. Recibir el servicio es derecho." },
      { q: "La Convivencia e Inserción Social tiene por objeto la prestación de alojamiento:", a: ["Definitivo","Temporal","Solo para mayores de 65 años","Solo hospitalario"], c: 1, e: "TEMPORAL, no definitivo. Trampa clásica de examen." },
      { q: "La provisión de cuidados a ancianos en domicilio se realiza desde:", a: ["Autocuidados, cuidado informal y cuidado formal","Cuidado formal e informal solamente","Autocuidados y cuidado formal","Cuidados hospitalarios y domiciliarios"], c: 0, e: "Son 3 enfoques: autocuidados + informal + formal." },
      { q: "Para implementar educación para la salud en el anciano debemos considerar:", a: ["Las prioridades de la sociedad","El nivel sociocultural de la población","La institución de nuevos métodos","Todas son ciertas"], c: 1, e: "El nivel sociocultural exige acomodación de contenidos y método." },
      { q: "La visita domiciliaria se dirige especialmente a:", a: ["Mayores de 80 años","Jubilados","Personas que viven lejos del centro","Todas son ciertas"], c: 0, e: "Mayores de 80 años, solos, enfermos graves, alta reciente, terminales." },
      { q: "Las dos vacunas básicas que se aplican al anciano son:", a: ["Tétanos y gripe","Varicela y gripe","Triple vírica y tétanos","VIH y tétanos"], c: 0, e: "Tétanos y gripe son las básicas del anciano." },
      { q: "¿Cuál NO es una dificultad para la atención integral al anciano en AP?", a: ["Sobrecarga asistencial","Insuficiente formación en gerontología","La falta de recursos","Dificultad en coordinación AP-especializada"], c: 2, e: "La falta de recursos NO aparece en la lista del temario." },
      { q: "El SEPAD fue creado mediante:", a: ["Ley 39/2006","Ley 1/2008, de 22 de mayo","Decreto 12/1997","Decreto 93/2012"], c: 1, e: "Ley 1/2008. La 39/2006 es la Ley de Dependencia estatal." },
      { q: "Los CADEX están ubicados en:", a: ["Todas las capitales de comarca","Cáceres y Badajoz","Solo en Mérida","Cáceres, Badajoz y Mérida"], c: 1, e: "Ámbito provincial: uno en Cáceres y otro en Badajoz." },
      { q: "Los CADEX atienden a personas desde:", a: ["Los 18 años","Los 65 años","Los 0 años","Los 3 años"], c: 2, e: "Cualquier edad, desde los 0 años en adelante." },
      { q: "Del examen de salud al anciano se deriva fundamentalmente:", a: ["La detección precoz","Métodos de aprendizaje","El tratamiento a instaurar","La asignación de facultativo"], c: 2, e: "De los hallazgos del examen se deriva el tratamiento." },
      { q: "¿Qué función tienen los Servicios Sociales de Atención Social Básica?", a: ["Ofrecer atención sanitaria primaria","Brindar información, valoración y orientación sobre recursos sociales","Proporcionar atención médica a dependientes","Gestionar ayudas económicas directamente"], c: 1, e: "Su función es informar, valorar y orientar sobre recursos sociales." },
      { q: "El límite de tiempo de la Ayuda a Domicilio es:", a: ["3 horas diarias o 60 horas mensuales","2 horas diarias o 52 horas mensuales","4 horas diarias o 80 horas mensuales","No tiene límite"], c: 1, e: "Máximo 2 horas/día o 52 horas/mes." },
      { q: "En 2010 la OMS lanzó su iniciativa global para el cuidado del anciano que consiste en:", a: ["Equipos multidisciplinares de atención geriátrica","Ciudades que favorezcan a las personas mayores","Integración del anciano en el mercado laboral","Nuevas residencias de ancianos"], c: 1, e: "Ciudades amigables con los mayores (Age-friendly cities)." },
      { q: "La Unidad de Coordinación de Violencia sobre la Mujer se encarga de:", a: ["Atención sanitaria primaria","Protección y apoyo a mujeres víctimas de violencia de género","Gestión del SAAD","Servicios sociales básicos"], c: 1, e: "Asesoramiento jurídico, social y psicológico + protección." },
      { q: "¿Cuál es una actuación de la prestación de Ayuda a Domicilio?", a: ["Cirugías menores en domicilio","Acompañamiento fuera del hogar para gestiones","Atención hospitalaria especializada","Servicios educativos para menores"], c: 1, e: "El acompañamiento fuera del hogar es ayuda de carácter personal." },
      { q: "El enfermero comunitario de enlace prioriza especialmente a:", a: ["Jóvenes con enfermedades agudas","Personas de edad avanzada, con déficit de movilidad y procesos crónicos/terminales","Niños con enfermedades congénitas","Mujeres embarazadas de riesgo"], c: 1, e: "Ancianos + déficit movilidad + crónicos/terminales." }
    ]
  },
  {
    id: 2,
    nombre: "Derechos del paciente y voluntades anticipadas",
    preguntas: [
      { q: "La vejez propiamente dicha se denomina también:", a: ["Madurez precoz","Decrepitud","Madurez tardía","Caquexia senil"], c: 2, e: "Vejez = madurez tardía. Decrepitud/caquexia senil es otra etapa." },
      { q: "¿Qué edad expresa la capacidad de mantener roles personales e integración social?", a: ["Cronológica","Biológica","Psicológica","Funcional"], c: 3, e: "La edad FUNCIONAL mide integración social y capacidades físicas." },
      { q: "El coeficiente de renovación se calcula dividiendo:", a: [">65 años / 0-14 años","0-14 años / >65 años","15-50 / >50 años",">50 / 15-50 años"], c: 0, e: "Población >65 entre población 0-14 años." },
      { q: "El anciano frágil tiene generalmente edad superior a:", a: ["60 años","65 años","75 años","80 años"], c: 3, e: ">80 años es una de las características del anciano frágil." },
      { q: "¿Qué modificación de la piel del anciano es INCORRECTA?", a: ["Se vuelve descolorida","Se vuelve más húmeda y sudorosa","Se vuelve delgada","Aparecen arrugas"], c: 1, e: "La piel se vuelve SECA, no húmeda. Trampa clásica." },
      { q: "En el envejecimiento se pierde antes la capacidad de detectar sabores:", a: ["Dulces","Salados","Ácidos","Amargos"], c: 1, e: "Se pierde el SALADO antes que el dulce." },
      { q: "¿Cuántos ítems tiene el índice de Barthel?", a: ["5","10","15","20"], c: 1, e: "10 ítems. Máxima independencia 100, máxima dependencia 0." },
      { q: "En la Escala de Tinetti, ¿cuál es la puntuación máxima del equilibrio?", a: ["6","12","16","28"], c: 2, e: "Equilibrio: max 16. Marcha: max 12. Total: 28." },
      { q: "¿Qué escala es la más recomendable para screening de depresión en ancianos?", a: ["Pfeiffer","Yesavage (GDS)","Hamilton","Goldberg"], c: 1, e: "GDS de Yesavage: 30 ítems, <11 normal. La más recomendable." },
      { q: "En el test de Pfeiffer se considera patológico a partir de:", a: ["3 errores","4 errores","5 errores","7 errores"], c: 2, e: "≥5 errores = patológico. +1 error permitido sin estudios primarios." },
      { q: "El dispositivo geriátrico de 2º nivel es:", a: ["Centro de Salud","Hospital de Día geriátrico","Hospital de cuidados continuados","Residencia gerontológica"], c: 1, e: "2º nivel = Hospital de Día. 1º = AP/Centro Salud. 3º = Hospital cuidados continuados." },
      { q: "El Grado II de dependencia (Ley 39/2006) es:", a: ["Dependencia moderada","Dependencia severa","Gran dependencia","Dependencia leve"], c: 1, e: "Grado I: moderada. Grado II: severa. Grado III: gran dependencia." },
      { q: "El MMSE de Folstein indica deterioro cognitivo cuando la puntuación es inferior a:", a: ["20 puntos","24 puntos","26 puntos","30 puntos"], c: 1, e: "<24 puntos = deterioro cognitivo. Puntuación máxima: 30." },
      { q: "Si un paciente obtiene 70 puntos en el Barthel, indica:", a: ["Independencia","Dependencia leve","Dependencia moderada","Dependencia severa"], c: 1, e: ">60: dependencia leve o independencia. 40-55: moderada. 20-40: severa. <20: total." },
      { q: "La osteoporosis se acelera en los primeros 5 años de la menopausia por déficit de:", a: ["Progesterona","Estrógenos","Testosterona","Calcio"], c: 1, e: "Déficit de ESTRÓGENOS acelera la pérdida de calcio óseo." },
      { q: "¿Quién inició los primeros estudios sobre valoración geriátrica?", a: ["Florence Nightingale","Marjory Warren","Virginia Henderson","Dorothea Orem"], c: 1, e: "Marjory Warren, enfermera y doctora, desde Unidad de Larga Estancia en Reino Unido." },
      { q: "El déficit mineral más frecuente en el anciano es:", a: ["Hierro","Calcio","Potasio","Magnesio"], c: 1, e: "El CALCIO es el déficit mineral más frecuente en el anciano." },
      { q: "El PAI del PCC en Extremadura es gestionado por:", a: ["Ministerio de Sanidad","SES","INSS","OMS"], c: 1, e: "Servicio Extremeño de Salud (SES)." },
      { q: "¿Cuál es correcta sobre el PAI del PCC?", a: ["Es un modelo rígido e inmutable","No se adapta a cada área sanitaria","Debe evaluarse periódicamente y modificarse según resultados","Solo aplica a cardiovasculares"], c: 2, e: "Evaluable, modificable, adaptable. No rígido." },
      { q: "La hostilidad en el anciano se manifiesta normalmente en forma de:", a: ["Agresiones físicas","Agresiones verbales","Llanto","Silencio"], c: 1, e: "Hostilidad = agresiones VERBALES. El miedo se manifiesta con rechazo al cuidador." }
    ]
  },
  {
    id: 3,
    nombre: "Documentación sanitaria e historias clínicas",
    preguntas: [
      { q: "La definición de salud mental de la OMS incluye aspectos de tipo:", a: ["Psicológico, afectivo y ambiental","Psicológico, afectivo y social","Afectivo, social y ambiental","Físico, psicológico y social"], c: 3, e: "Bienestar FÍSICO, psicológico y social." },
      { q: "¿Qué edición del DSM es la vigente?", a: ["Segunda","Tercera","Cuarta","Quinta"], c: 3, e: "DSM-5 = quinta edición." },
      { q: "¿Cuántas categorías de trastornos mentales incluye el DSM-5?", a: ["18","22","30","35"], c: 1, e: "22 categorías." },
      { q: "¿Qué clasificación de trastornos mentales recomienda la OMS?", a: ["DSM-5","CIE-10","DMS-III","ASLO-V"], c: 1, e: "CIE-10 es la recomendada por la OMS." },
      { q: "La ansiedad es un trastorno de tipo:", a: ["Psicótico","Neurótico","Sociopatía","Asociado a toxicomanías"], c: 1, e: "Trastorno NEURÓTICO." },
      { q: "El nivel de ansiedad MODERADO se caracteriza por:", a: ["Campo perceptivo amplio","Atención selectiva y campo disminuido","Incapacidad total","Ausencia de síntomas"], c: 1, e: "Atención selectiva + campo perceptivo disminuido." },
      { q: "El miedo irracional a los espacios abiertos es:", a: ["Claustrofobia","Dismorfofobia","Agorafobia","Eritrofobia"], c: 2, e: "AGORAFOBIA = espacios abiertos." },
      { q: "Los contenidos psíquicos que se imponen a pesar del individuo son:", a: ["Neurosis","Fobia","Obsesión","Ilusión"], c: 2, e: "OBSESIÓN = se impone a pesar suyo." },
      { q: "Los flashbacks son típicos del:", a: ["TOC","Trastorno de estrés traumático","Trastorno fóbico","Ansiedad generalizada"], c: 1, e: "Flashbacks = estrés traumático." },

// Game state
let currentTema = null;
let currentQuestion = 0;
let score = 0;
let userAnswers = [];

// DOM refs
const screenTemas = document.getElementById('screen-temas');
const screenQuiz = document.getElementById('screen-quiz');
const screenResults = document.getElementById('screen-results');
const temasGrid = document.getElementById('temas-grid');
const quizTemaTitle = document.getElementById('quiz-tema-title');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const questionNumber = document.getElementById('question-number');
const questionText = document.getElementById('question-text');
const optionsList = document.getElementById('options-list');
const explanationBox = document.getElementById('explanation-box');
const btnNext = document.getElementById('btn-next');
const scoreNumber = document.getElementById('score-number');
const scorePercent = document.getElementById('score-percent');
const scoreMessage = document.getElementById('score-message');
const reviewList = document.getElementById('review-list');

// Build theme grid
temas.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'tema-btn';
  btn.innerHTML = `<span class="tema-num">${t.id}</span><span class="tema-name">${t.nombre}</span>`;
  btn.addEventListener('click', () => startQuiz(t.id));
  temasGrid.appendChild(btn);
});

function startQuiz(temaId) {
  currentTema = temas.find(t => t.id === temaId);
  currentQuestion = 0;
  score = 0;
  userAnswers = [];
  screenTemas.style.display = 'none';
  screenResults.style.display = 'none';
  screenQuiz.style.display = 'block';
  quizTemaTitle.textContent = `Tema ${currentTema.id}: ${currentTema.nombre}`;
  showQuestion();
  window.scrollTo(0, 0);
}

function showQuestion() {
  const q = currentTema.preguntas[currentQuestion];
  const total = currentTema.preguntas.length;
  progressFill.style.width = ((currentQuestion / total) * 100) + '%';
  progressText.textContent = `Pregunta ${currentQuestion + 1} de ${total}`;
  questionNumber.textContent = `Pregunta ${currentQuestion + 1}`;
  questionText.textContent = q.q;
  optionsList.innerHTML = '';
  explanationBox.style.display = 'none';
  btnNext.style.display = 'none';

  const letters = ['a)', 'b)', 'c)', 'd)'];
  q.a.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = `${letters[i]} ${opt}`;
    btn.addEventListener('click', () => selectAnswer(i));
    optionsList.appendChild(btn);
  });
}

function selectAnswer(idx) {
  const q = currentTema.preguntas[currentQuestion];
  const buttons = optionsList.querySelectorAll('.option-btn');
  buttons.forEach(b => b.classList.add('disabled'));

  userAnswers.push(idx);

  if (idx === q.c) {
    buttons[idx].classList.add('correct');
    score++;
  } else {
    buttons[idx].classList.add('incorrect');
    buttons[q.c].classList.add('correct');
  }

  explanationBox.textContent = q.e;
  explanationBox.style.display = 'block';

  if (currentQuestion < currentTema.preguntas.length - 1) {
    btnNext.textContent = 'Siguiente pregunta';
  } else {
    btnNext.textContent = 'Ver resultados';
  }
  btnNext.style.display = 'block';
}

btnNext.addEventListener('click', () => {
  currentQuestion++;
  if (currentQuestion < currentTema.preguntas.length) {
    showQuestion();
    window.scrollTo(0, 0);
  } else {
    showResults();
  }
});

function showResults() {
  screenQuiz.style.display = 'none';
  screenResults.style.display = 'block';
  window.scrollTo(0, 0);

  const total = currentTema.preguntas.length;
  const pct = Math.round((score / total) * 100);
  scoreNumber.textContent = score;
  scorePercent.textContent = pct + '%';

  if (pct >= 90) scoreMessage.textContent = 'Excelente! Dominas este tema.';
  else if (pct >= 70) scoreMessage.textContent = 'Muy bien! Sigue repasando.';
  else if (pct >= 50) scoreMessage.textContent = 'Aprobado, pero puedes mejorar.';
  else scoreMessage.textContent = 'Necesitas repasar este tema.';

  progressFill.style.width = '100%';

  // Review
  reviewList.innerHTML = '';
  const letters = ['a)', 'b)', 'c)', 'd)'];
  currentTema.preguntas.forEach((q, i) => {
    const isCorrect = userAnswers[i] === q.c;
    const div = document.createElement('div');
    div.className = 'review-item ' + (isCorrect ? 'review-correct' : 'review-wrong');

    let html = `<div class="review-q">${i + 1}. ${q.q}</div>`;
    if (!isCorrect) {
      html += `<div class="review-answer user-wrong">Tu respuesta: ${letters[userAnswers[i]]} ${q.a[userAnswers[i]]}</div>`;
    }
    html += `<div class="review-answer correct-ans">Correcta: ${letters[q.c]} ${q.a[q.c]}</div>`;
    html += `<div class="review-explanation">${q.e}</div>`;
    div.innerHTML = html;
    reviewList.appendChild(div);
  });
}

document.getElementById('btn-retry').addEventListener('click', () => startQuiz(currentTema.id));
document.getElementById('btn-back-temas').addEventListener('click', () => {
  screenResults.style.display = 'none';
  screenQuiz.style.display = 'none';
  screenTemas.style.display = 'block';
  window.scrollTo(0, 0);
});
