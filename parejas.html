<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Parejas - OpoJuegos TCAE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#fff;display:flex;flex-direction:column;align-items:center;padding:12px;-webkit-tap-highlight-color:transparent;user-select:none}
a{text-decoration:none;color:#fff}
.back-btn{align-self:flex-start;background:rgba(255,255,255,.08);border:1px solid #333;border-radius:12px;padding:8px 16px;font-size:.9em;margin-bottom:8px;transition:all .2s}
.back-btn:active{background:rgba(255,255,255,.15)}
h1{font-size:1.6em;text-align:center;margin-bottom:4px;background:linear-gradient(90deg,#2ecc71,#27ae60);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:#aaa;font-size:.85em;margin-bottom:16px;text-align:center}

/* Screens */
.screen{display:none;width:100%;max-width:600px;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* Menu */
.menu-section{width:100%;margin-bottom:16px}
.menu-section h2{font-size:1em;color:#2ecc71;margin-bottom:10px;text-align:center}
.options-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%}
.opt-btn{background:rgba(46,204,113,.08);border:2px solid #2ecc7144;border-radius:14px;padding:14px 8px;text-align:center;font-size:.85em;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;min-height:48px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.opt-btn:active,.opt-btn.selected{background:rgba(46,204,113,.25);border-color:#2ecc71;transform:scale(.96)}
.opt-btn.selected{box-shadow:0 0 12px #2ecc7133}
.cat-grid{grid-template-columns:1fr 1fr}
.play-btn{background:linear-gradient(135deg,#2ecc71,#27ae60);border:none;border-radius:16px;padding:16px 40px;font-size:1.1em;font-weight:700;color:#fff;cursor:pointer;margin-top:16px;transition:all .2s;font-family:inherit;width:100%;max-width:300px}
.play-btn:active{transform:scale(.95);filter:brightness(1.1)}
.play-btn:disabled{opacity:.4;transform:none}

/* Stats bar */
.stats-bar{display:flex;justify-content:space-around;width:100%;background:rgba(0,0,0,.25);border-radius:14px;padding:10px 4px;margin-bottom:12px;gap:4px}
.stat{display:flex;flex-direction:column;align-items:center;font-size:.75em;color:#aaa}
.stat .val{font-size:1.4em;font-weight:700;color:#fff}

/* Card grid */
.card-grid{display:grid;gap:8px;width:100%;max-width:600px;padding:0 2px}
.card-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.card-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.card-grid.cols-5{grid-template-columns:repeat(5,1fr)}

/* Card */
.card-container{perspective:800px;cursor:pointer}
.card{position:relative;width:100%;padding-bottom:120%;transform-style:preserve-3d;transition:transform .45s ease;border-radius:12px}
.card.flipped{transform:rotateY(180deg)}
.card.matched{pointer-events:none}
.card-face{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;padding:6px;text-align:center;font-size:.72em;line-height:1.25;font-weight:600;overflow:hidden;word-break:break-word}
.card-back{background:linear-gradient(135deg,#1e3a5f,#16213e);border:2px solid #2ecc7166;color:#2ecc71;font-size:2em}
.card-back::before{content:"?";font-size:1em}
.card-front{transform:rotateY(180deg);border:2px solid #444}
.card-front.concept{background:linear-gradient(135deg,#1a3a2e,#0f2e1e);border-color:#2ecc71;color:#a8f0c8}
.card-front.definition{background:linear-gradient(135deg,#1e2a4e,#162040);border-color:#3498db;color:#a8d4f0}

/* Match animation */
@keyframes matchGlow{
0%{box-shadow:0 0 0 0 #2ecc7100}
30%{box-shadow:0 0 20px 6px #2ecc7188}
100%{box-shadow:0 0 0 0 #2ecc7100}
}
.card.matched .card-face{opacity:.7}
.card.match-anim{animation:matchGlow .8s ease-out}

/* No-match shake */
@keyframes shake{0%,100%{transform:rotateY(180deg)}25%{transform:rotateY(180deg) translateX(-4px)}75%{transform:rotateY(180deg) translateX(4px)}}
.card.no-match{animation:shake .35s ease}

/* Results */
.results-box{background:rgba(0,0,0,.3);border:2px solid #2ecc71;border-radius:20px;padding:28px 20px;text-align:center;width:100%;max-width:400px;margin-top:20px}
.results-box .stars{font-size:2.8em;margin:12px 0}
.results-box h2{font-size:1.4em;margin-bottom:16px;color:#2ecc71}
.results-box .detail{font-size:1em;color:#ccc;margin:6px 0}
.results-box .detail span{color:#fff;font-weight:700}
.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}
.btn-row button{background:linear-gradient(135deg,#2ecc71,#27ae60);border:none;border-radius:14px;padding:14px 24px;font-size:1em;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-row button:active{transform:scale(.95)}
.btn-row .secondary{background:rgba(255,255,255,.08);border:1px solid #444}
</style>
</head>

<a href="index.html" class="back-btn">🏠 Menu</a>
<h1>🃏 Parejas TCAE</h1>
<p class="subtitle">Encuentra los pares concepto-definicion</p>

<!-- MENU SCREEN -->
<div class="screen active" id="menuScreen">
  <div class="menu-section">

      <button class="opt-btn" data-diff="6" onclick="selectDiff(this)">Facil<br><small>6 parejas</small></button>
      <button class="opt-btn selected" data-diff="10" onclick="selectDiff(this)">Normal<br><small>10 parejas</small></button>

  <div class="menu-section">
    <h2>Categoria</h2>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">

    <div class="stat"><span class="val" id="movesVal">0</span>Movimientos</div>

    <div class="btn-row">
      <button onclick="startGame()">Jugar de nuevo</button>
      <button class="secondary" onclick="showScreen('menuScreen')">Cambiar opciones</button>
    </div>
  </div>
</div>

<script>

// ============================================================
// GAME STATE
// ============================================================
let selectedDiff = 10;
let selectedCat = "todas";
let moves = 0;
let matchedPairs = 0;
let totalPairs = 0;
let timerInterval = null;
let seconds = 0;
let firstCard = null;
let secondCard = null;
let lockBoard = false;

// ============================================================
// UI HELPERS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectDiff(btn) {
  document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedDiff = parseInt(btn.dataset.diff);
}

function selectCat(btn) {
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = btn.dataset.cat;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
  // Reset
  moves = 0;
  matchedPairs = 0;
  seconds = 0;
  firstCard = null;
  secondCard = null;
  lockBoard = false;
  if (timerInterval) clearInterval(timerInterval);

  // Filter pairs
  let pool = selectedCat === "todas" ? [...parejas] : parejas.filter(p => p.category === selectedCat);
  shuffle(pool);

  // If not enough pairs, fill from all
  if (pool.length < selectedDiff) {
    const extra = parejas.filter(p => !pool.includes(p));
    shuffle(extra);
    pool = pool.concat(extra.slice(0, selectedDiff - pool.length));
  }

  const chosen = pool.slice(0, selectedDiff);
  totalPairs = chosen.length;

  // Create card data (concept + definition for each pair)
  let cards = [];
  chosen.forEach((pair, idx) => {
    cards.push({ id: idx, type: "concept", text: pair.concept, pairId: idx });
    cards.push({ id: idx, type: "definition", text: pair.definition, pairId: idx });
  });
  shuffle(cards);

  // Determine grid columns
  const total = cards.length;
  const grid = document.getElementById('cardGrid');
  grid.className = 'card-grid';
  if (total <= 12) grid.classList.add('cols-3');
  else if (total <= 20) grid.classList.add('cols-4');
  else grid.classList.add('cols-5');

  // Render cards
  grid.innerHTML = '';
  cards.forEach((c, i) => {
    const container = document.createElement('div');
    container.className = 'card-container';
    container.innerHTML = `
      <div class="card" data-pair="${c.pairId}" data-type="${c.type}" data-index="${i}">
        <div class="card-face card-back"></div>
        <div class="card-face card-front ${c.type}">${c.text}</div>
      </div>`;
    container.addEventListener('click', () => flipCard(container.querySelector('.card')));
    grid.appendChild(container);
  });

  // Update UI
  document.getElementById('movesVal').textContent = '0';
  document.getElementById('timerVal').textContent = '0:00';
  document.getElementById('pairsVal').textContent = '0/' + totalPairs;

  showScreen('gameScreen');

  // Start timer
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('timerVal').textContent = formatTime(seconds);
  }, 1000);
}

function flipCard(card) {
  if (lockBoard) return;
  if (card.classList.contains('flipped')) return;
  if (card.classList.contains('matched')) return;

  card.classList.add('flipped');

  if (!firstCard) {
    firstCard = card;
    return;
  }

  secondCard = card;
  lockBoard = true;
  moves++;
  document.getElementById('movesVal').textContent = moves;

  checkMatch();
}

function checkMatch() {
  const isMatch = firstCard.dataset.pair === secondCard.dataset.pair &&
                  firstCard.dataset.type !== secondCard.dataset.type;

  if (isMatch) {
    firstCard.classList.add('matched', 'match-anim');
    secondCard.classList.add('matched', 'match-anim');
    matchedPairs++;
    document.getElementById('pairsVal').textContent = matchedPairs + '/' + totalPairs;
    resetBoard();

    if (matchedPairs === totalPairs) {
      clearInterval(timerInterval);
      setTimeout(showResults, 600);
    }
  } else {
    firstCard.classList.add('no-match');
    secondCard.classList.add('no-match');
    setTimeout(() => {
      firstCard.classList.remove('flipped', 'no-match');
      secondCard.classList.remove('flipped', 'no-match');
      resetBoard();
    }, 900);
  }
}

function resetBoard() {
  firstCard = null;
  secondCard = null;
  lockBoard = false;
}

function showResults() {
  const perfect = totalPairs;
  const ratio = moves / perfect;
  let stars = 3;
  if (ratio > 2.5) stars = 1;
  else if (ratio > 1.6) stars = 2;

  const starStr = "⭐".repeat(stars) + "☆".repeat(3 - stars);

  document.getElementById('starsDisplay').textContent = starStr;
  document.getElementById('resMoves').textContent = moves;
  document.getElementById('resTime').textContent = formatTime(seconds);
  document.getElementById('resPairs').textContent = totalPairs;

  showScreen('resultsScreen');
}
</script>
