.header{text-align:center;padding:10px}

.stats{display:flex;justify-content:center;gap:12px;font-size:.85em;margin:5px 0;flex-wrap:wrap}

.progress{height:4px;background:#333;border-radius:2px;margin:8px 0}

.q-box{background:rgba(255,255,255,.05);border:1px solid #333;border-radius:16px;padding:16px;margin:8px 0}
.q-num{font-size:.8em;color:#e94560;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.q-text{font-size:1.05em;line-height:1.5;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:8px}

.opt:active{transform:scale(.98)}
.opt.selected{border-color:#e94560;background:rgba(233,69,96,.15)}
.opt.correct{border-color:#4caf50!important;background:rgba(76,175,80,.2)!important}
.opt.wrong{border-color:#f44336!important;background:rgba(244,67,54,.2)!important}
.opt .letter{font-weight:bold;color:#e94560;min-width:20px}
.nav-row{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.btn{padding:12px 20px;border:none;border-radius:12px;font-size:.95em;font-weight:bold;cursor:pointer;min-height:48px;touch-action:manipulation;transition:all .2s}
.btn:active{transform:scale(.95)}
.btn-nav{background:#2a2a5e;color:#fff;border:1px solid #444}
.btn-flag{background:#ff980022;color:#ff9800;border:1px solid #ff9800}
.btn-flag.flagged{background:#ff9800;color:#000}
.btn-end{background:linear-gradient(135deg,#e94560,#ff6b6b);color:#fff}
.btn-start{background:linear-gradient(135deg,#e94560,#ff6b6b);color:#fff;font-size:1.1em;padding:16px 40px}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:10px 0}
.grid-cell{width:100%;aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7em;cursor:pointer;border:1px solid #333;background:rgba(255,255,255,.03);touch-action:manipulation}
.grid-cell.answered{background:#2a2a5e;border-color:#555}
.grid-cell.flagged{border-color:#ff9800;box-shadow:0 0 4px #ff980044}
.grid-cell.current{border-color:#e94560;box-shadow:0 0 6px #e9456044}
.grid-cell.review-correct{background:#4caf5044;border-color:#4caf50}
.grid-cell.review-wrong{background:#f4433644;border-color:#f44336}
.exp-box{background:#1a3a1a;border:1px solid #4caf50;border-radius:10px;padding:10px;margin-top:10px;font-size:.9em;line-height:1.4}
.result-box{background:rgba(255,255,255,.05);border:1px solid #e94560;border-radius:20px;padding:24px;text-align:center;max-width:400px;margin:20px auto}
.result-box h2{color:#e94560;font-size:1.6em;margin-bottom:12px}
.result-box .nota{font-size:2.5em;font-weight:bold;margin:10px 0}
.nota.aprobado{color:#4caf50}.nota.suspendido{color:#f44336}
.result-detail{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;font-size:.95em}
.result-detail div{padding:8px;border-radius:8px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.hidden{display:none}
.home-link{display:block;text-align:center;margin-top:12px;color:#aaa;text-decoration:none;font-size:.9em}
</style>

</div>
<div class="nav-row"><button class="btn btn-end" onclick="confirmEnd()">FINALIZAR EXAMEN</button></div>

{q:'La historia clinica es documento:',a:['Administrativo','Clinico-asistencial','Judicial','Economico'],c:1,e:'Fundamental clinico-asistencial',t:25},
{q:'El CMBD se utiliza para:',a:['Diagnostico','Codificacion y estadistica','Facturacion','Solo investigacion'],c:1,e:'Datos al alta para estadisticas',t:25},
{q:'Grafica enfermeria registra:',a:['Solo medicacion','Constantes, balance, observaciones','Solo temperatura','Solo diagnostico'],c:1,e:'Constantes, balance hidrico, dieta',t:25},
{q:'Consentimiento informado forma parte de:',a:['Historia social','Historia clinica','Informe alta','Receta'],c:1,e:'Documentacion de la H. clinica',t:25}
];

let cur=0,answers=[],flags=[],timerSec=7200,interval,reviewing=false;
function startExam(){
  answers=new Array(100).fill(-1);flags=new Array(100).fill(false);
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('examArea').classList.remove('hidden');
  buildGrid();showQ();
  interval=setInterval(()=>{
    timerSec--;
    const m=Math.floor(timerSec/60),s=timerSec%60;
    const tb=document.getElementById('timer');
    tb.textContent=`${m}:${String(s).padStart(2,'0')}`;
    if(timerSec<=300)tb.classList.add('danger');
    if(timerSec<=0){clearInterval(interval);endExam()}
  },1000);
}
function showQ(){
  const q=Q[cur],letters=['A','B','C','D'];
  const fb=document.getElementById('flagBtn');
  fb.className='btn btn-flag'+(flags[cur]?' flagged':'');
  document.getElementById('qBox').innerHTML=`
    <div class="q-num"><span>Pregunta ${cur+1} / 100</span></div>
    <div class="q-text">${q.q}</div>
    <div class="opts">${q.a.map((a,i)=>{
      let cls='opt';
      if(!reviewing&&answers[cur]===i)cls+=' selected';
      if(reviewing){
        if(i===q.c)cls+=' correct';
        else if(answers[cur]===i)cls+=' wrong';
      }
      return `<div class="${cls}" onclick="pick(${i})"><span class="letter">${letters[i]}</span>${a}</div>`;
    }).join('')}</div>
    ${reviewing?`<div class="exp-box">✓ Correcta: ${letters[q.c]}) ${q.a[q.c]}<br>${q.e}</div>`:''}`;
  updateGrid();updateStats();
  document.getElementById('progFill').style.width=((cur+1)/100*100)+'%';
}
function pick(i){
  if(reviewing)return;
  answers[cur]=answers[cur]===i?-1:i;
  showQ();
}
function go(d){cur=Math.max(0,Math.min(99,cur+d));showQ()}
function goTo(i){cur=i;showQ()}
function toggleFlag(){flags[cur]=!flags[cur];showQ()}
function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let i=0;i<100;i++){
    const c=document.createElement('div');c.className='grid-cell';c.textContent=i+1;
    c.onclick=()=>goTo(i);g.appendChild(c);
  }
}
function updateGrid(){
  document.querySelectorAll('.grid-cell').forEach((c,i)=>{
    c.className='grid-cell';
    if(answers[i]>=0)c.classList.add('answered');
    if(flags[i])c.classList.add('flagged');
    if(i===cur)c.classList.add('current');
    if(reviewing){
      if(answers[i]>=0){
        c.classList.add(answers[i]===Q[i].c?'review-correct':'review-wrong');
      }
    }
  });
}
function updateStats(){
  let ok=0,fail=0,blank=0,fl=flags.filter(f=>f).length;
  answers.forEach((a,i)=>{if(a<0)blank++;else if(a===Q[i].c)ok++;else fail++});
  document.getElementById('sOk').textContent='✓ '+ok;
  document.getElementById('sFail').textContent='✗ '+fail;
  document.getElementById('sBlank').textContent='— '+blank;
  document.getElementById('sFlag').textContent='⚑ '+fl;
}
function confirmEnd(){if(confirm('¿Finalizar el examen? No podras cambiar las respuestas.'))endExam()}
function endExam(){
  clearInterval(interval);
  let ok=0,fail=0,blank=0;
  answers.forEach((a,i)=>{if(a<0)blank++;else if(a===Q[i].c)ok++;else fail++});
  const nota=Math.max(0,(ok-fail*0.25)/100*10).toFixed(2);
  const pct=Math.round(ok/100*100);
  const aprobado=parseFloat(nota)>=5;
  reviewing=true;
  document.getElementById('examArea').querySelector('.timer').textContent='FINALIZADO';
  document.getElementById('examArea').querySelector('.timer').classList.remove('danger');
  document.querySelectorAll('.btn-end').forEach(b=>b.classList.add('hidden'));
  document.querySelectorAll('.btn-flag').forEach(b=>b.classList.add('hidden'));
  const ra=document.getElementById('resultArea');ra.classList.remove('hidden');
  ra.innerHTML=`
    <div class="result-box">
      <h2>${aprobado?'¡APROBADO!':'SUSPENSO'}</h2>
      <div class="nota ${aprobado?'aprobado':'suspendido'}">${nota}</div>
      <p style="color:#aaa">sobre 10 (con penalizacion -0,25)</p>
      <div class="result-detail">
        <div style="background:#4caf5022;color:#4caf50">✓ Aciertos: ${ok}</div>
        <div style="background:#f4433622;color:#f44336">✗ Fallos: ${fail}</div>
        <div style="background:#78909c22;color:#78909c">— En blanco: ${blank}</div>
        <div style="background:#ffc10722;color:#ffc107">% Acierto: ${pct}%</div>
      </div>
      <p style="font-size:.85em;color:#aaa;margin-top:10px">Navega por las preguntas para ver las respuestas correctas y explicaciones</p>
      <button class="btn btn-start" onclick="location.reload()" style="margin-top:12px;font-size:.95em;padding:12px 30px">REPETIR SIMULACRO</button>
      <a href="index.html" class="home-link">← Volver al menu</a>
    </div>`;
  cur=0;showQ();
}
</script>
